name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: tidy
        run: go mod tidy

      - name: vet
        run: go vet ./...

      - name: fmt
        run: test -z "$(gofmt -l .)"

      - name: test
        run: go test -v -shuffle=on -coverprofile=coverage.out ./...